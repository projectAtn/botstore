<!doctype html><html><head><meta charset='utf-8'><style>html,body{margin:0;background:#0b1020;width:1024px;height:1024px;overflow:hidden}#c{width:1024px;height:1024px;display:block}</style></head><body><canvas id='c' width='1024' height='1024'></canvas><script>const c=document.getElementById('c');const x=c.getContext('2d');x.fillStyle='#0b1020';x.fillRect(0,0,1024,1024);function ring(r,color,w){x.strokeStyle=color;x.lineWidth=w;x.beginPath();x.arc(512,512,r,0,Math.PI*2);x.stroke();}ring(420,'#2653ff',14);ring(330,'#14b8a6',12);ring(250,'#7dd3fc',8);x.fillStyle='#e5eeff';x.font='bold 320px Arial';x.textAlign='center';x.textBaseline='middle';x.fillText('BS',512,540);</script></body></html>
