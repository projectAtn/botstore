version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: botstore-db
    environment:
      POSTGRES_DB: botstore
      POSTGRES_USER: botstore
      POSTGRES_PASSWORD: botstore-dev-password
    volumes:
      - botstore_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botstore -d botstore"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botstore-api
    environment:
      DATABASE_URL: postgresql+psycopg://botstore:botstore-dev-password@db:5432/botstore
    ports:
      - "8787:8787"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: botstore-worker
    command: ["python", "/app/scripts/worker_loop.py"]
    environment:
      DATABASE_URL: postgresql+psycopg://botstore:botstore-dev-password@db:5432/botstore
      WORKER_MODE: queue_consumer
      WORKER_INTERVAL_SECONDS: "30"
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  botstore_pgdata:
